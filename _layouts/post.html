---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%Y-%m-%d" }} · {{ site.author }}</p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <p class="post-back"><a href="{{ '/' | relative_url }}">&larr; 목록으로</a></p>
</article>
